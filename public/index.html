<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelpont Portal</title>
    <meta name="theme-color" content="#0e7490">
    <link rel="stylesheet" href="css/portal.css">
</head>
<body>
    <div class="portal-layout">
        <header class="navbar">
            <div class="navbar-brand">
                <div class="navbar-title">Travelpont Portal</div>
            </div>
        </header>

        <main class="page-content">
            <h1 class="fade-up">Üdv a Travelpont Portalon!</h1>
            <p style="color:var(--text-secondary); margin-top:8px;" class="fade-up">Válassz egy modult a bal oldali menüből, vagy az alábbi kártyák egyikéből.</p>

            <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:20px; margin-top:32px;">
                <a href="ajanlatok.html" class="card fade-up" style="padding:28px; text-decoration:none; color:inherit;">
                    <div style="font-size:32px; margin-bottom:12px;">✈️</div>
                    <h3>Ajánlatok</h3>
                    <p style="color:var(--text-secondary); font-size:14px; margin-top:6px;">Utazási ajánlatok kezelése, árak, affiliate linkek.</p>
                </a>
                <a href="uticelok.html" class="card fade-up" style="padding:28px; text-decoration:none; color:inherit;">
                    <div style="font-size:32px; margin-bottom:12px;">🌍</div>
                    <h3>Úticélok</h3>
                    <p style="color:var(--text-secondary); font-size:14px; margin-top:6px;">Ország / tájegység / város oldalak, hierarchiával.</p>
                </a>
            </div>

            <div style="margin-top:40px; font-size:12px; color:var(--text-muted);" id="statusLine">Szerver állapot ellenőrzése…</div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { guardPage, apiCall } from './js/auth-guard.js';
        import { initSidebar } from './js/sidebar.js';
        import { API_CONFIG } from './js/api-config.js';

        guardPage(async user => {
            initSidebar(user);

            try {
                const status = await apiCall(API_CONFIG.STATUS_URL);
                document.getElementById('statusLine').textContent =
                    `Szerver: ${status.status} · AI: ${status.configured ? 'beállítva' : 'nincs beállítva'} · ${status.timestamp}`;
            } catch (e) {
                document.getElementById('statusLine').textContent = 'Szerver állapot nem elérhető (' + e.message + ')';
            }
        });
    </script>
</body>
</html>
