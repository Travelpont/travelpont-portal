<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Úticélok – Travelpont Portal</title>
    <meta name="theme-color" content="#0e7490">
    <link rel="stylesheet" href="css/portal.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
</head>
<body>
    <div class="portal-layout">
        <header class="navbar">
            <div class="navbar-brand"><div class="navbar-title">🌍 Úticélok</div></div>
            <div class="navbar-right">
                <button class="btn btn-primary btn-sm" id="newBtn">+ Új úticél</button>
            </div>
        </header>

        <main class="page-content">
            <div class="crud-layout">
                <!-- ---- Lista panel (fastruktúra) ---- -->
                <div class="card crud-list-panel">
                    <input type="text" class="input-field crud-search" id="searchInput" placeholder="Keresés cím szerint…">
                    <div id="listContainer"><p style="color:var(--text-muted); font-size:13px;">Betöltés…</p></div>
                </div>

                <!-- ---- Szerkesztő panel ---- -->
                <div class="card crud-editor" id="editorPanel">
                    <div class="crud-editor-empty">Válassz egy úticélt a listából, vagy hozz létre újat. Elsőként az országokat vidd fel (szülő nélkül), utána a tájegységeket/városokat.</div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { guardPage, apiCall, toast, safeFileName } from './js/auth-guard.js';
        import { initSidebar } from './js/sidebar.js';
        import { API_CONFIG } from './js/api-config.js';
        import { auth, storage } from './js/firebase-config.js';
        import { ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';
        import { generateWithAI, generateSeoSuggestion } from './js/ai-helper.js';
        import { setupQuillEditor, setQuillContent } from './js/quill-helper.js';
        import { attachCharCounter } from './js/char-counter.js';

        const PROXY = API_CONFIG.UTICEL_PROXY_URL;

        let items = [];       // teljes lista (list action, thumbnail-lel is)
        let metaFlat = [];    // meta action – teljes flat lista (szülő-választóhoz)
        let activeId = null;
        let contentQuill = null;  // a "Bemutató szöveg" rich text szerkesztő aktuális példánya
        let currentItem = null;   // a szerkesztőben épp megnyitott úticél (galéria-frissítéshez kell)

        guardPage(async user => {
            initSidebar(user);
            await loadAll();
            await applyAiProposal();
        });

        // ---- AI Műhely kézbesítés: az ai-muhely.html „Szerkesztés az
        // Úticéloknál" gombja localStorage-ba teszi a javaslatot; itt
        // betöltjük a szerkesztőbe, de NEM mentünk – az a szerkesztő dolga. ----
        async function applyAiProposal() {
            const raw = localStorage.getItem('tp_ai_proposal');
            if (!raw) return;
            localStorage.removeItem('tp_ai_proposal');

            let p;
            try { p = JSON.parse(raw); } catch { return; }

            try {
                if (p.tipus === 'uticel_update' && p.id) {
                    await selectItem(p.id);
                } else {
                    await selectItem(null);
                    // Új, AI-ból érkező úticél biztonságos alapja: piszkozat
                    document.getElementById('f_status').value = 'draft';
                    if (p.parent_id) document.getElementById('f_parent').value = String(p.parent_id);
                }

                if (p.cim)    document.getElementById('f_title').value = p.cim;
                if (p.leiras) document.getElementById('f_leiras').value = p.leiras;
                if (p.tartalom_html) setQuillContent(contentQuill, 'f_content', p.tartalom_html);
                if (p.szint) {
                    const el = document.getElementById('f_szint');
                    el.value = p.szint;
                    el.dispatchEvent(new Event('change'));  // szint-függő mezők láthatósága
                }
                [['penznem', 'f_penznem'], ['nyelv', 'f_nyelv'], ['idozona', 'f_idozona'],
                 ['beutazas', 'f_beutazas'], ['legjobb_idoszak', 'f_legjobb_idoszak'],
                 ['repuloter', 'f_repuloter'], ['repules_ido', 'f_repules_ido']]
                 .forEach(([k, id]) => { if (p[k]) document.getElementById(id).value = p[k]; });
                if (p.seo_title) {
                    const el = document.getElementById('f_seo_title');
                    el.value = p.seo_title; el.dispatchEvent(new Event('input'));
                }
                if (p.seo_metadesc) {
                    const el = document.getElementById('f_seo_metadesc');
                    el.value = p.seo_metadesc; el.dispatchEvent(new Event('input'));
                }

                toast('✨ AI-javaslat betöltve – nézd át, tölts fel képet, majd 💾 Mentés!', 'info');
            } catch (e) {
                toast('AI-javaslat betöltése sikertelen: ' + e.message, 'error');
            }
        }

        document.getElementById('newBtn').addEventListener('click', () => selectItem(null));
        document.getElementById('searchInput').addEventListener('input', debounce(() => loadAll(), 350));

        function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

        async function loadAll() {
            const search = document.getElementById('searchInput').value.trim();
            try {
                const [listData, metaData] = await Promise.all([
                    apiCall(PROXY, { action: 'list', extraQuery: { search, status: 'any', per_page: 200 } }),
                    apiCall(PROXY, { action: 'meta' }),
                ]);
                items = listData.items || [];
                metaFlat = metaData.uticelok || [];
                renderList();
            } catch (e) {
                toast('Lista betöltése sikertelen: ' + e.message, 'error');
            }
        }

        // ---- Fastruktúra: szülő előbb, utána közvetlenül a gyerekei (rekurzív bejárás) ----
        function buildOrderedTree(list) {
            const byParent = {};
            list.forEach(it => { (byParent[it.parent] = byParent[it.parent] || []).push(it); });
            const result = [];
            (function walk(parentId, depth) {
                (byParent[parentId] || []).forEach(it => {
                    result.push({ ...it, depth });
                    walk(it.id, depth + 1);
                });
            })(0, 0);
            return result;
        }

        function renderList() {
            const c = document.getElementById('listContainer');
            if (items.length === 0) { c.innerHTML = '<p style="color:var(--text-muted); font-size:13px;">Nincs találat.</p>'; return; }
            const ordered = buildOrderedTree(items);
            c.innerHTML = ordered.map(it => `
                <div class="crud-list-item ${it.id === activeId ? 'active' : ''}" data-depth="${Math.min(it.depth, 3)}" data-id="${it.id}">
                    ${it.thumbnail_url ? `<img class="crud-list-thumb" src="${it.thumbnail_url}">` : `<div class="crud-list-thumb"></div>`}
                    <div style="min-width:0;">
                        <div class="crud-list-title">${escapeHtml(it.title || '(cím nélkül)')}</div>
                        <div class="crud-list-sub">${it.status === 'draft' ? 'Piszkozat' : ''}</div>
                    </div>
                </div>`).join('');
            c.querySelectorAll('.crud-list-item').forEach(el => {
                el.addEventListener('click', () => selectItem(parseInt(el.dataset.id)));
            });
        }

        async function selectItem(id) {
            activeId = id;
            renderList();
            if (id === null) { renderEditor(emptyItem()); return; }
            try {
                const item = await apiCall(PROXY, { action: 'get', extraQuery: { id } });
                renderEditor(item);
            } catch (e) {
                toast('Betöltés sikertelen: ' + e.message, 'error');
            }
        }

        function emptyItem() {
            return { id: null, title: '', content: '', status: 'publish', parent: 0, thumbnail_url: '', tpu_leiras: '',
                tpu_szint: '', tpu_penznem: '', tpu_nyelv: '', tpu_idozona: '', tpu_beutazas: '',
                tpu_legjobb_idoszak: '', tpu_repuloter: '', tpu_repules_ido: '', tpu_terkep: '',
                seo_title: '', seo_metadesc: '', galeria: [] };
        }

        // A szint-választó lehetőségei (a WP plugin tpu_get_szintek()-jét tükrözi).
        const SZINTEK = { orszag: 'Ország', regio: 'Régió / tájegység', varos: 'Város / település', egyeb: 'Egyéb terület' };

        // ---- Szülő-választó legördülő: fastruktúra behúzással, önmaga kizárva ----
        function parentOptionsHtml(currentId, selectedParent) {
            const ordered = buildOrderedTree(metaFlat.filter(m => m.id !== currentId));
            const opts = ['<option value="0">— nincs (gyökér szintű, pl. ország) —</option>']
                .concat(ordered.map(m => {
                    const indent = '　'.repeat(m.depth); // teljes szélességű szóköz a behúzáshoz
                    return `<option value="${m.id}" ${String(m.id) === String(selectedParent) ? 'selected' : ''}>${indent}${escapeHtml(m.title)}</option>`;
                }));
            return opts.join('');
        }

        function renderEditor(item) {
            currentItem = item;

            document.getElementById('editorPanel').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                    <h2>${item.id ? 'Úticél szerkesztése' : 'Új úticél'}</h2>
                    <select class="input-field" id="f_status" style="width:auto;">
                        <option value="publish" ${item.status === 'publish' ? 'selected' : ''}>Publikált</option>
                        <option value="draft" ${item.status === 'draft' ? 'selected' : ''}>Piszkozat</option>
                    </select>
                </div>

                <div class="crud-section-title">Kiemelt kép</div>
                <div class="crud-dropzone" id="dropzone">
                    ${item.thumbnail_url
                        ? `<img src="${item.thumbnail_url}">`
                        : `<span class="crud-dropzone-label">${item.id ? 'Kattints ide a kép feltöltéséhez' : 'Előbb mentsd el az úticélt, utána tölthetsz fel képet'}</span>`}
                </div>
                <input type="file" id="fileInput" accept="image/*" style="display:none;">

                <div class="crud-section-title">Galéria (további fotók)</div>
                <div class="crud-gallery-grid" id="galeriaGridEl"></div>
                <input type="file" id="galeriaFileInput" accept="image/*" style="display:none;">
                ${!item.id ? `<div class="input-hint">Előbb mentsd el az úticélt, utána tölthetsz fel galéria-képeket.</div>` : ''}

                <div class="crud-section-title">Alapadatok</div>
                <div class="input-group"><label class="input-label">Cím</label><input class="input-field" id="f_title" value="${escapeAttr(item.title)}" placeholder="pl. Olaszország / Veneto / Velence"></div>

                <div class="input-group">
                    <label class="input-label">Szint</label>
                    <select class="input-field" id="f_szint">
                        <option value="">— válassz —</option>
                        ${Object.entries(SZINTEK).map(([v, l]) => `<option value="${v}" ${item.tpu_szint === v ? 'selected' : ''}>${l}</option>`).join('')}
                    </select>
                    <div class="input-hint">Mi ez az úticél? Ettől függ az oldal felépítése és az itt kitölthető mezők. (A szint nem kötelező láncot — kis országnál kihagyható a régió.)</div>
                </div>

                <div class="input-group">
                    <label class="input-label">Szülő úticél</label>
                    <select class="input-field" id="f_parent">${parentOptionsHtml(item.id, item.parent)}</select>
                    <div class="input-hint">Országnál hagyd üresen; tájegységnél/városnál válaszd ki a fölérendelt úticélt.</div>
                </div>

                <div class="input-group">
                    <button class="crud-ai-btn" id="aiBtn" type="button">✨ AI segítség a szöveghez</button>
                    <div class="crud-ai-panel" id="aiPanel" style="display:none;">
                        <textarea class="input-field" id="aiPrompt" placeholder="Írd le pár szóban, mi jellemzi ezt a helyet (pl. 'Isztria, Horvátország egyik tartománya, olívaligetek és tengerpart')" rows="2"></textarea>
                        <button class="btn btn-accent btn-sm" id="aiGenerateBtn" style="margin-top:8px;" type="button">Generálás</button>
                    </div>
                    <label class="input-label">Rövid leíró szöveg (1-2 mondat, a kiemelt kép alatt jelenik meg)</label>
                    <textarea class="input-field" id="f_leiras" rows="2">${escapeHtml(item.tpu_leiras)}</textarea>
                </div>

                <div class="input-group">
                    <label class="input-label">Bemutató szöveg</label>
                    <div id="quill_content"></div>
                    <input type="hidden" id="f_content">
                </div>

                <div class="crud-section-title" id="szintFieldsTitle">📋 Adatok &amp; gyakorlati infó</div>
                <div id="szintFields">
                    <div class="input-group" data-szint="orszag">
                        <label class="input-label">Pénznem</label>
                        <input class="input-field" id="f_penznem" value="${escapeAttr(item.tpu_penznem)}" placeholder="pl. Euró (EUR)">
                    </div>
                    <div class="input-group" data-szint="orszag">
                        <label class="input-label">Beszélt nyelv</label>
                        <input class="input-field" id="f_nyelv" value="${escapeAttr(item.tpu_nyelv)}" placeholder="pl. olasz">
                    </div>
                    <div class="input-group" data-szint="orszag">
                        <label class="input-label">Időzóna</label>
                        <input class="input-field" id="f_idozona" value="${escapeAttr(item.tpu_idozona)}" placeholder="pl. CET (UTC+1)">
                    </div>
                    <div class="input-group" data-szint="orszag">
                        <label class="input-label">Be- és kiutazási tudnivaló</label>
                        <textarea class="input-field" id="f_beutazas" rows="2" placeholder="pl. EU-tagország, személyi igazolvány elég.">${escapeHtml(item.tpu_beutazas)}</textarea>
                    </div>
                    <div class="input-group" data-szint="regio varos">
                        <label class="input-label">Legjobb utazási időszak</label>
                        <input class="input-field" id="f_legjobb_idoszak" value="${escapeAttr(item.tpu_legjobb_idoszak)}" placeholder="pl. május–szeptember">
                    </div>
                    <div class="input-group" data-szint="varos">
                        <label class="input-label">Legközelebbi repülőtér</label>
                        <input class="input-field" id="f_repuloter" value="${escapeAttr(item.tpu_repuloter)}" placeholder="pl. Velence (VCE)">
                    </div>
                    <div class="input-group" data-szint="varos">
                        <label class="input-label">Repülési idő Budapestről</label>
                        <input class="input-field" id="f_repules_ido" value="${escapeAttr(item.tpu_repules_ido)}" placeholder="pl. kb. 1 óra 20 perc">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Google Maps beágyazási URL</label>
                        <input class="input-field" id="f_terkep" value="${escapeAttr(item.tpu_terkep)}" placeholder="https://www.google.com/maps/embed?pb=...">
                        <div class="input-hint">Google Maps → Megosztás → Térkép beágyazása → a HTML „src” értéke. Csak a https://www.google.com/maps/embed… kezdetű URL-t fogadja el.</div>
                    </div>
                </div>

                <div class="crud-section-title">🔍 SEO beállítások (Google-találat)</div>
                <div class="input-group">
                    <button class="crud-tool-btn" id="seoAiBtn" type="button">✨ AI-javaslat a cím/leírás alapján</button>
                    <label class="input-label">SEO cím <span id="seoTitleCount" style="font-weight:400;">0</span>/60</label>
                    <input class="input-field" id="f_seo_title" value="${escapeAttr(item.seo_title)}" maxlength="70" placeholder="Ha üresen hagyod, a WP/Yoast alapértelmezettet használja">
                </div>
                <div class="input-group">
                    <label class="input-label">Meta-leírás <span id="seoMetadescCount" style="font-weight:400;">0</span>/155</label>
                    <textarea class="input-field" id="f_seo_metadesc" rows="2" maxlength="200">${escapeHtml(item.seo_metadesc)}</textarea>
                </div>

                <div style="display:flex; gap:12px; margin-top:24px;">
                    <button class="btn btn-primary" id="saveBtn">💾 Mentés</button>
                    ${item.permalink ? `<a class="btn btn-ghost" href="${item.permalink}" target="_blank">Megnézem élesben ↗</a>` : ''}
                    ${item.edit_url ? `<a class="btn btn-ghost" href="${item.edit_url}" target="_blank">WP admin ↗</a>` : ''}
                </div>
            `;

            contentQuill = setupQuillEditor('quill_content', 'f_content', item.content, 'Az úticél hosszabb, weboldalon megjelenő bemutató szövege…');

            document.getElementById('aiBtn').addEventListener('click', () => {
                const panel = document.getElementById('aiPanel');
                panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            });
            document.getElementById('aiGenerateBtn').addEventListener('click', runAI);

            attachCharCounter('f_seo_title', 'seoTitleCount', 60);
            attachCharCounter('f_seo_metadesc', 'seoMetadescCount', 155);
            document.getElementById('seoAiBtn').addEventListener('click', runSeoSuggestion);

            document.getElementById('saveBtn').addEventListener('click', saveItem);

            // Szint-függő mezők mutatása/rejtése (a WP admin-szint.js logikáját tükrözi):
            // üres szint = minden látszik; egyébként csak az adott szinthez tartozó.
            const szintSelect = document.getElementById('f_szint');
            function applySzintFields() {
                const szint = szintSelect.value;
                document.querySelectorAll('#szintFields [data-szint]').forEach(el => {
                    const szintek = (el.getAttribute('data-szint') || '').split(/\s+/);
                    el.style.display = (szint === '' || szintek.indexOf(szint) !== -1) ? '' : 'none';
                });
            }
            szintSelect.addEventListener('change', applySzintFields);
            applySzintFields();

            const dropzone = document.getElementById('dropzone');
            dropzone.addEventListener('click', () => {
                if (!activeId) { toast('Előbb mentsd el az úticélt, utána tölthetsz fel képet.', 'info'); return; }
                document.getElementById('fileInput').click();
            });
            document.getElementById('fileInput').addEventListener('change', handleImageUpload);

            renderGaleria();
            document.getElementById('galeriaFileInput').addEventListener('change', handleGaleriaUpload);
        }

        // ---- Galéria: rács kirajzolása a currentItem.galeria (id/url/caption) alapján ----
        function renderGaleria() {
            const grid = document.getElementById('galeriaGridEl');
            const kepek = currentItem.galeria || [];

            grid.innerHTML = kepek.map(kep => `
                <div class="crud-gallery-item">
                    <div class="crud-gallery-thumb">
                        <img src="${kep.url}">
                        <button class="crud-gallery-remove" type="button" data-id="${kep.id}" title="Eltávolítás">✕</button>
                    </div>
                    <input class="crud-gallery-caption" type="text" data-id="${kep.id}" value="${escapeAttr(kep.caption || '')}" placeholder="Felirat (pl. Positano)">
                </div>`).join('') + (activeId ? `<div class="crud-gallery-add" id="galeriaAddTile" title="Kép hozzáadása">+</div>` : '');

            grid.querySelectorAll('.crud-gallery-remove').forEach(btn => {
                btn.addEventListener('click', () => removeGaleriaKep(parseInt(btn.dataset.id)));
            });
            grid.querySelectorAll('.crud-gallery-caption').forEach(inp => {
                inp.addEventListener('change', () => saveGaleriaCaption(parseInt(inp.dataset.id), inp.value));
            });
            const addTile = document.getElementById('galeriaAddTile');
            if (addTile) addTile.addEventListener('click', () => document.getElementById('galeriaFileInput').click());
        }

        async function handleGaleriaUpload(e) {
            const file = e.target.files[0];
            e.target.value = '';
            if (!file || !activeId) return;
            try {
                const uid = auth.currentUser.uid;
                const path = `uticelok/${uid}/galeria_${Date.now()}_${safeFileName(file.name)}`;
                const storageRef = ref(storage, path);
                await uploadBytes(storageRef, file);
                const url = await getDownloadURL(storageRef);

                const result = await apiCall(PROXY, { action: 'galeria_add', extraQuery: { id: activeId }, body: { url } });
                currentItem.galeria = result.galeria;
                renderGaleria();
                toast('Galéria-kép hozzáadva!', 'success');
            } catch (e) {
                toast('Kép feltöltése sikertelen: ' + e.message, 'error');
            }
        }

        async function removeGaleriaKep(kepId) {
            try {
                const result = await apiCall(PROXY, { action: 'galeria_remove', extraQuery: { id: activeId, kep_id: kepId }, method: 'DELETE' });
                currentItem.galeria = result.galeria;
                renderGaleria();
                toast('Galéria-kép eltávolítva.', 'success');
            } catch (e) {
                toast('Eltávolítás sikertelen: ' + e.message, 'error');
            }
        }

        // A felirat a mezőből kilépve (change) mentődik; nem rajzoljuk újra a rácsot,
        // hogy a fókusz/gépelés ne ugorjon el a többi mezőről.
        async function saveGaleriaCaption(kepId, caption) {
            try {
                const result = await apiCall(PROXY, { action: 'galeria_caption', extraQuery: { id: activeId, kep_id: kepId }, body: { caption } });
                currentItem.galeria = result.galeria;
                toast('Felirat mentve.', 'success');
            } catch (e) {
                toast('Felirat mentése sikertelen: ' + e.message, 'error');
            }
        }

        async function runAI() {
            const promptEl = document.getElementById('aiPrompt');
            const btn = document.getElementById('aiGenerateBtn');
            if (!promptEl.value.trim()) { toast('Írj néhány szót arról, mi jellemzi ezt a helyet.', 'info'); return; }
            btn.disabled = true; btn.textContent = 'Generálás…';
            try {
                const result = await generateWithAI('uticel', promptEl.value.trim());
                if (result.leiras) document.getElementById('f_leiras').value = result.leiras;
                if (result.tartalom) setQuillContent(contentQuill, 'f_content', result.tartalom);
                toast('AI-szöveg beillesztve – nézd át mentés előtt!', 'success');
            } catch (e) {
                toast('AI hiba: ' + e.message, 'error');
            } finally {
                btn.disabled = false; btn.textContent = 'Generálás';
            }
        }

        async function runSeoSuggestion() {
            const btn = document.getElementById('seoAiBtn');
            btn.disabled = true; btn.textContent = 'Generálás…';
            try {
                const result = await generateSeoSuggestion({
                    title: document.getElementById('f_title').value,
                    contentHtml: document.getElementById('f_content').value,
                });
                if (result.seo_title) {
                    document.getElementById('f_seo_title').value = result.seo_title;
                    document.getElementById('f_seo_title').dispatchEvent(new Event('input'));
                }
                if (result.seo_metadesc) {
                    document.getElementById('f_seo_metadesc').value = result.seo_metadesc;
                    document.getElementById('f_seo_metadesc').dispatchEvent(new Event('input'));
                }
                toast('SEO-javaslat beillesztve – nézd át mentés előtt!', 'success');
            } catch (e) {
                toast('AI hiba: ' + e.message, 'error');
            } finally {
                btn.disabled = false; btn.textContent = '✨ AI-javaslat a cím/leírás alapján';
            }
        }

        async function saveItem() {
            const body = {
                title: document.getElementById('f_title').value.trim(),
                content: document.getElementById('f_content').value,
                status: document.getElementById('f_status').value,
                parent: document.getElementById('f_parent').value,
                tpu_leiras: document.getElementById('f_leiras').value,
                tpu_szint: document.getElementById('f_szint').value,
                tpu_penznem: document.getElementById('f_penznem').value,
                tpu_nyelv: document.getElementById('f_nyelv').value,
                tpu_idozona: document.getElementById('f_idozona').value,
                tpu_beutazas: document.getElementById('f_beutazas').value,
                tpu_legjobb_idoszak: document.getElementById('f_legjobb_idoszak').value,
                tpu_repuloter: document.getElementById('f_repuloter').value,
                tpu_repules_ido: document.getElementById('f_repules_ido').value,
                tpu_terkep: document.getElementById('f_terkep').value,
                seo_title: document.getElementById('f_seo_title').value,
                seo_metadesc: document.getElementById('f_seo_metadesc').value,
            };
            if (!body.title) { toast('A cím megadása kötelező.', 'error'); return; }

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true; saveBtn.textContent = 'Mentés…';
            try {
                const saved = activeId
                    ? await apiCall(PROXY, { action: 'update', extraQuery: { id: activeId }, body })
                    : await apiCall(PROXY, { action: 'create', body });
                activeId = saved.id;
                toast('Elmentve!', 'success');
                await loadAll();
                renderEditor(saved);
            } catch (e) {
                toast('Mentés sikertelen: ' + e.message, 'error');
            } finally {
                saveBtn.disabled = false; saveBtn.textContent = '💾 Mentés';
            }
        }

        async function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file || !activeId) return;
            const dropzone = document.getElementById('dropzone');
            dropzone.innerHTML = '<div class="spinner"></div>';
            try {
                const uid = auth.currentUser.uid;
                const path = `uticelok/${uid}/${Date.now()}_${safeFileName(file.name)}`;
                const storageRef = ref(storage, path);
                await uploadBytes(storageRef, file);
                const url = await getDownloadURL(storageRef);

                const result = await apiCall(PROXY, { action: 'sideload', extraQuery: { id: activeId }, body: { url } });
                dropzone.innerHTML = `<img src="${result.url}">`;
                toast('Kép feltöltve!', 'success');
                loadAll();
            } catch (e) {
                toast('Kép feltöltése sikertelen: ' + e.message, 'error');
                dropzone.innerHTML = '<span class="crud-dropzone-label">Kattints ide a kép feltöltéséhez</span>';
            }
        }

        function escapeHtml(s) { return (s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }
        function escapeAttr(s) { return (s ?? '').toString().replace(/"/g, '&quot;'); }
    </script>
</body>
</html>
