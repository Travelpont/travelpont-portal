<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajánlatok – Travelpont Portal</title>
    <meta name="theme-color" content="#0e7490">
    <link rel="stylesheet" href="css/portal.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
</head>
<body>
    <div class="portal-layout">
        <header class="navbar">
            <div class="navbar-brand"><div class="navbar-title">✈️ Ajánlatok</div></div>
            <div class="navbar-right">
                <button class="btn btn-primary btn-sm" id="newBtn">+ Új ajánlat</button>
            </div>
        </header>

        <main class="page-content">
            <div class="crud-layout">
                <!-- ---- Lista panel ---- -->
                <div class="card crud-list-panel">
                    <div id="filterBanner" style="display:none; margin-bottom:10px;"></div>
                    <input type="text" class="input-field crud-search" id="searchInput" placeholder="Keresés cím szerint…">
                    <div id="listContainer"><p style="color:var(--text-muted); font-size:13px;">Betöltés…</p></div>
                </div>

                <!-- ---- Szerkesztő panel ---- -->
                <div class="card crud-editor" id="editorPanel">
                    <div class="crud-editor-empty">Válassz egy ajánlatot a listából, vagy hozz létre újat.</div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { guardPage, apiCall, toast, safeFileName } from './js/auth-guard.js';
        import { initSidebar } from './js/sidebar.js';
        import { API_CONFIG } from './js/api-config.js';
        import { auth, storage } from './js/firebase-config.js';
        import { ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';
        import { optimalizaltWebp } from './js/kep-webp.js';
        import { generateWithAI, generatePostCaption, generateSeoSuggestion } from './js/ai-helper.js';
        import { setupQuillEditor, setQuillContent } from './js/quill-helper.js';
        import { buildKiwiLink } from './js/kiwi-link-builder.js';
        import { AIRPORTS } from './js/iata-airports.js';
        import { attachCharCounter } from './js/char-counter.js';
        import { createSearchableSelect } from './js/searchable-select.js';

        const PROXY = API_CONFIG.AJANLAT_PROXY_URL;

        let items = [];
        let meta = { kategoriak: [], uticelok: [] };
        let activeId = null;      // null = "új ajánlat" mód
        let selectedKategoriak = [];
        let contentQuill = null; // a "Leírás" rich text szerkesztő aktuális példánya
        let currentItem = null;  // a szerkesztőben épp megnyitott ajánlat (galéria-frissítéshez kell)

        // A Dashboard "Karbantartás" panel linkjei ?szuro=lejart|lejaro paraméterrel érkeznek
        let activeFilter = new URLSearchParams(window.location.search).get('szuro');

        guardPage(async user => {
            initSidebar(user);
            await loadMeta();
            await loadList();
        });

        document.getElementById('newBtn').addEventListener('click', () => selectItem(null));
        document.getElementById('searchInput').addEventListener('input', debounce(() => loadList(), 350));

        // Élő teljességi jelző: bármely mező változására újraszámoljuk, mi hiányzik
        // még egy teljes ajánlathoz. Delegált listener a panelen – a renderEditor
        // innerHTML-cseréi nem törlik, és nem is duplázódik.
        const teljessegFrissites = debounce(() => updateTeljesseg(), 400);
        document.getElementById('editorPanel').addEventListener('input', teljessegFrissites);
        document.getElementById('editorPanel').addEventListener('change', teljessegFrissites);

        function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

        async function loadMeta() {
            try {
                meta = await apiCall(PROXY, { action: 'meta' });
            } catch (e) {
                toast('Metaadatok betöltése sikertelen: ' + e.message, 'error');
            }
        }

        async function loadList() {
            const search = document.getElementById('searchInput').value.trim();
            try {
                const data = await apiCall(PROXY, { action: 'list', extraQuery: { search, status: 'any', per_page: 100 } });
                items = data.items || [];
                renderList();
            } catch (e) {
                toast('Lista betöltése sikertelen: ' + e.message, 'error');
            }
        }

        // ---- Karbantartás-szűrő alkalmazása (Dashboard "lejárt"/"lejáró" linkjeiből) ----
        function filterItems(list) {
            // deal_lejart: dátum-lejárat VAGY kézi "Lejárt" státusz (plugin v1.14+; régi API-n undefined → it.lejart a fallback)
            if (activeFilter === 'lejart') return list.filter(it => it.deal_lejart || it.lejart);
            if (activeFilter === 'lejaro') return list.filter(it => !(it.deal_lejart || it.lejart) && it.hatralevo_napok !== null && it.hatralevo_napok >= 0 && it.hatralevo_napok <= 7);
            return list;
        }

        function updateFilterBanner() {
            const banner = document.getElementById('filterBanner');
            if (!activeFilter) { banner.style.display = 'none'; return; }
            const label = activeFilter === 'lejart' ? '⚠️ Lejárt ajánlatok' : '⏳ Hamarosan lejáró ajánlatok (7 napon belül)';
            banner.innerHTML = `<span class="badge badge-gold">${label}</span> <button class="btn btn-ghost btn-sm" id="clearFilterBtn" type="button" style="margin-top:6px;">✕ Szűrő törlése</button>`;
            banner.style.display = 'block';
            document.getElementById('clearFilterBtn').addEventListener('click', () => { activeFilter = null; renderList(); });
        }

        function renderList() {
            updateFilterBanner();
            const c = document.getElementById('listContainer');
            const visible = filterItems(items);
            if (visible.length === 0) { c.innerHTML = '<p style="color:var(--text-muted); font-size:13px;">Nincs találat.</p>'; return; }
            c.innerHTML = visible.map(it => `
                <div class="crud-list-item ${it.id === activeId ? 'active' : ''}" data-id="${it.id}">
                    ${it.thumbnail_url ? `<img class="crud-list-thumb" src="${it.thumbnail_url}">` : `<div class="crud-list-thumb"></div>`}
                    <div style="min-width:0;">
                        <div class="crud-list-title">${escapeHtml(it.title || '(cím nélkül)')}</div>
                        <div class="crud-list-sub">${it.status === 'draft' ? 'Piszkozat' : ((it.deal_lejart || it.lejart) ? 'Lejárt' : it.ar_format || '')}</div>
                    </div>
                </div>`).join('');
            c.querySelectorAll('.crud-list-item').forEach(el => {
                el.addEventListener('click', () => selectItem(parseInt(el.dataset.id)));
            });
        }

        async function selectItem(id) {
            activeId = id;
            renderList();
            await loadMeta(); // friss úticél-lista: a más fülön / épp most felvitt úticélok is választhatók legyenek reload nélkül
            if (id === null) { renderEditor(emptyItem()); return; }
            try {
                const item = await apiCall(PROXY, { action: 'get', extraQuery: { id } });
                renderEditor(item);
            } catch (e) {
                toast('Betöltés sikertelen: ' + e.message, 'error');
            }
        }

        function emptyItem() {
            return { id: null, title: '', content: '', status: 'publish', kategoriak: [], thumbnail_url: '',
                tpa_ajanlat_tipus: 'repulo_szallas',
                tpa_celallomas: '', tpa_indulas: '', tpa_indulas_iata: '', tpa_cel_iata: '', tpa_cel_varos: '',
                tpa_indulas_datum: '', tpa_hazaut_datum: '',
                tpa_idopont: '', tpa_ejszakak: '', tpa_uticel: '', tpa_miert_szuper: '', tpa_poggyasz: '',
                tpa_szallas_nev: '', tpa_szallas_csillag: '', tpa_szallas_ellatas: '',
                tpa_repjegy_ar: '', tpa_busz_ar: '', tpa_szallas_ar: '', tpa_fo_szam: '2', tpa_ar: '', tpa_ar_megjegyzes: '',
                tpa_ervenyes: '', tpa_statusz: 'aktiv', tpa_talalat_datuma: '',
                tpa_kiwi_link: '', tpa_busz_link: '', tpa_szallas_link: '', tpa_szallas_platform: '',
                seo_title: '', seo_metadesc: '', galeria: [] };
        }

        // A szerkesztő 7 sorszámozott blokkja – az ugrómenü is ebből épül
        const BLOKKOK = [
            { id: 'blokk-1', cim: '1️⃣ Alapok' },
            { id: 'blokk-2', cim: '2️⃣ Utazás' },
            { id: 'blokk-3', cim: '3️⃣ Szállás' },
            { id: 'blokk-4', cim: '4️⃣ Ár összesen' },
            { id: 'blokk-5', cim: '5️⃣ Deal állapota' },
            { id: 'blokk-6', cim: '6️⃣ Sztori és képek' },
            { id: 'blokk-7', cim: '7️⃣ Marketing' },
        ];

        function renderEditor(item) {
            selectedKategoriak = [...(item.kategoriak || [])];
            currentItem = item;

            // A kézi időpont-panel csak akkor induljon nyitva, ha tényleg abban van adat
            const fallbackNyitva = (item.tpa_idopont || item.tpa_ejszakak) && !(item.tpa_indulas_datum && item.tpa_hazaut_datum);

            document.getElementById('editorPanel').innerHTML = `
                <h2 style="margin-bottom:12px;">${item.id ? 'Ajánlat szerkesztése' : 'Új ajánlat'}</h2>
                <div class="crud-ugromenu">
                    ${BLOKKOK.map(b => `<button class="crud-ugro" type="button" data-cel="${b.id}">${b.cim}</button>`).join('')}
                </div>

                <!-- ═══ 1️⃣ ALAPOK: mi ez az ajánlat, hova szól ═══ -->
                <div class="crud-blokk" id="blokk-1">
                    <div class="crud-section-title">1️⃣ Alapok</div>
                    <div class="input-group"><label class="input-label">Cím</label><input class="input-field" id="f_title" value="${escapeAttr(item.title)}" placeholder="pl. Amalfi-part 4 éjszaka"></div>
                    <div class="input-group">
                        <label class="input-label">Ajánlat típusa</label>
                        <select class="input-field" id="f_ajanlat_tipus">
                            <option value="repulo_szallas" ${item.tpa_ajanlat_tipus === 'repulo_szallas' || !item.tpa_ajanlat_tipus ? 'selected' : ''}>✈️ Repülő + szállás</option>
                            <option value="busz_szallas" ${item.tpa_ajanlat_tipus === 'busz_szallas' ? 'selected' : ''}>🚌 Busz (Flixbus) + szállás</option>
                            <option value="csak_szallas" ${item.tpa_ajanlat_tipus === 'csak_szallas' ? 'selected' : ''}>🏨 Csak szállás (egyéni utazás)</option>
                        </select>
                        <div class="input-hint">Ez szabja meg, mely mezők jelennek meg a 2️⃣ Utazás blokkban.</div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Úticél</label>
                        <div id="uticelMount"></div>
                        <div class="input-hint">Kezdj gépelni (város vagy ország). Az ajánlat automatikusan megjelenik a kiválasztott Úticél oldalán, és a kártyán is ez a név szerepel.</div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Kategóriák</label>
                        <div class="crud-tag-grid" id="kategoriaGrid">
                            ${meta.kategoriak.map(k => `<span class="crud-tag ${selectedKategoriak.includes(k.name) ? 'selected' : ''}" data-name="${escapeAttr(k.name)}">${escapeHtml(k.name)}</span>`).join('')}
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Célállomás-felirat (nem kötelező)</label>
                        <input class="input-field" id="f_celallomas" value="${escapeAttr(item.tpa_celallomas)}" placeholder="pl. Amalfi-part, Olaszország">
                        <div class="input-hint">Üresen hagyva a kártyán a fenti Úticél neve jelenik meg – csak akkor töltsd ki, ha mást szeretnél kiírni.</div>
                    </div>
                </div>

                <!-- ═══ 2️⃣ UTAZÁS: útvonal + dátumok + jegyár + foglalási link, EGY helyen ═══ -->
                <div class="crud-blokk" id="blokk-2">
                    <div class="crud-section-title">2️⃣ Utazás</div>
                    <div class="crud-row-2" data-tpa-tipus="repulo_szallas">
                        <div class="input-group">
                            <label class="input-label">Indulási reptér</label>
                            <div id="indulasReptMount"></div>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Érkezési reptér</label>
                            <div id="celReptMount"></div>
                            <input type="hidden" id="f_cel_varos" value="${escapeAttr(item.tpa_cel_varos)}">
                        </div>
                    </div>
                    <div class="input-hint" data-tpa-tipus="repulo_szallas" style="margin:-6px 0 10px;">A kártyán az útvonal reptérkódokkal jelenik meg (pl. BUD → PVK), alatta kisbetűvel a városok – a kiválasztás mindent automatikusan kitölt.</div>
                    <div class="input-group" data-tpa-tipus="busz_szallas">
                        <label class="input-label">Indulás helye (város)</label>
                        <input class="input-field" id="f_indulas" value="${escapeAttr(item.tpa_indulas)}" placeholder="pl. Budapest">
                    </div>
                    <div class="crud-row-2">
                        <div class="input-group"><label class="input-label">Odaút / érkezés dátuma</label><input class="input-field" type="date" id="f_indulas_datum" value="${escapeAttr(item.tpa_indulas_datum)}"></div>
                        <div class="input-group"><label class="input-label">Hazaút / távozás dátuma</label><input class="input-field" type="date" id="f_hazaut_datum" value="${escapeAttr(item.tpa_hazaut_datum)}"></div>
                    </div>
                    <div class="input-hint" id="datumInfo" style="margin:-6px 0 10px;"></div>
                    <div class="input-group">
                        <button class="crud-tool-btn" id="datumFallbackBtn" type="button">📅 Nincs pontos dátum? Kézi időpont-megadás</button>
                        <div class="crud-tool-panel" id="datumFallbackPanel" style="display:${fallbackNyitva ? 'block' : 'none'};">
                            <div class="crud-row-2">
                                <div class="input-group"><label class="input-label">Utazás időpontja (szabad szöveg)</label><input class="input-field" id="f_idopont" value="${escapeAttr(item.tpa_idopont)}" placeholder="pl. 2026. szeptember 10–14."></div>
                                <div class="input-group"><label class="input-label">Éjszakák száma</label><input class="input-field" type="number" min="0" id="f_ejszakak" value="${escapeAttr(item.tpa_ejszakak)}"></div>
                            </div>
                            <div class="input-hint">Csak akkor kell, ha nincsenek pontos dátumok – ha fent megadtad őket, ezeket figyelmen kívül hagyjuk.</div>
                        </div>
                    </div>
                    <div class="crud-row-2" data-tpa-tipus="repulo_szallas">
                        <div class="input-group">
                            <label class="input-label">Repjegy ára (Ft/fő, oda-vissza)</label>
                            <input class="input-field" type="number" min="0" id="f_repjegy" value="${escapeAttr(item.tpa_repjegy_ar)}">
                            <div class="input-hint">EGY FŐRE – az összesenhez a fő-számmal szorozzuk (4️⃣ blokk).</div>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Poggyász az árban</label>
                            <select class="input-field" id="f_poggyasz">
                                <option value="" ${!item.tpa_poggyasz ? 'selected' : ''}>— nincs megadva —</option>
                                <option value="kis_kezi" ${item.tpa_poggyasz === 'kis_kezi' ? 'selected' : ''}>Kis kézipoggyász (ülés alá férő)</option>
                                <option value="kezi" ${item.tpa_poggyasz === 'kezi' ? 'selected' : ''}>Kézipoggyász (fedélzeti táska/trolley)</option>
                                <option value="feladott" ${item.tpa_poggyasz === 'feladott' ? 'selected' : ''}>Kézipoggyász + feladott bőrönd</option>
                            </select>
                            <div class="input-hint">A fapados ár jellemzően csak kis kézipoggyászt tartalmaz – az őszinteség bizalmi tőke.</div>
                        </div>
                    </div>
                    <div class="input-group" data-tpa-tipus="repulo_szallas">
                        <label class="input-label">Repjegy affiliate link (Kiwi)</label>
                        <button class="crud-tool-btn" id="kiwiGenerateBtn" type="button">🔗 Link összeállítása a fenti adatokból</button>
                        <div style="display:flex; gap:8px;">
                            <input class="input-field" id="f_kiwi" value="${escapeAttr(item.tpa_kiwi_link)}" placeholder="https://c111.travelpayouts.com/click?...">
                            <button class="btn btn-ghost btn-sm" id="kiwiTestBtn" type="button" style="white-space:nowrap;">Tesztelés ↗</button>
                        </div>
                        <div class="input-hint">A fenti repterekből + dátumokból állítjuk össze a Travelpayouts-ba csomagolt linket – így a link és a kiírt időpont nem tud széttartani. A sima kiwi.com link után NEM jár jutalék!</div>
                    </div>
                    <div class="crud-row-2" data-tpa-tipus="busz_szallas">
                        <div class="input-group">
                            <label class="input-label">Buszjegy ára (Ft/fő, oda-vissza)</label>
                            <input class="input-field" type="number" min="0" id="f_busz_ar" value="${escapeAttr(item.tpa_busz_ar)}">
                            <div class="input-hint">EGY FŐRE – az összesenhez a fő-számmal szorozzuk (4️⃣ blokk).</div>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Flixbus / busz link</label>
                            <input class="input-field" id="f_busz_link" value="${escapeAttr(item.tpa_busz_link)}" placeholder="https://www.flixbus.hu/...">
                        </div>
                    </div>
                </div>

                <!-- ═══ 3️⃣ SZÁLLÁS: minden szállás-adat egy helyen (név + ár + link) ═══ -->
                <div class="crud-blokk" id="blokk-3">
                    <div class="crud-section-title">3️⃣ Szállás</div>
                    <div class="input-group">
                        <label class="input-label">Szállás neve</label>
                        <input class="input-field" id="f_szallas_nev" value="${escapeAttr(item.tpa_szallas_nev)}" placeholder="pl. Emelias Residences">
                        <div class="input-hint">Ahogy a foglalási oldalon szerepel – a kártyán és az aloldalon is megjelenik.</div>
                    </div>
                    <div class="crud-row-2">
                        <div class="input-group">
                            <label class="input-label">Csillagbesorolás</label>
                            <select class="input-field" id="f_szallas_csillag">
                                <option value="" ${!item.tpa_szallas_csillag ? 'selected' : ''}>— nincs megadva —</option>
                                ${[1,2,3,4,5].map(n => `<option value="${n}" ${String(item.tpa_szallas_csillag) === String(n) ? 'selected' : ''}>${n} csillagos (${'★'.repeat(n)})</option>`).join('')}
                            </select>
                            <div class="input-hint">Apartmannál/magánszállásnál hagyd üresen.</div>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Ellátás</label>
                            <select class="input-field" id="f_szallas_ellatas">
                                <option value="" ${!item.tpa_szallas_ellatas ? 'selected' : ''}>— nincs megadva —</option>
                                <option value="onellatas" ${item.tpa_szallas_ellatas === 'onellatas' ? 'selected' : ''}>Önellátás</option>
                                <option value="reggeli" ${item.tpa_szallas_ellatas === 'reggeli' ? 'selected' : ''}>Reggelivel</option>
                                <option value="felpanzio" ${item.tpa_szallas_ellatas === 'felpanzio' ? 'selected' : ''}>Félpanzió (reggeli + vacsora)</option>
                                <option value="teljes_panzio" ${item.tpa_szallas_ellatas === 'teljes_panzio' ? 'selected' : ''}>Teljes panzió</option>
                                <option value="all_inclusive" ${item.tpa_szallas_ellatas === 'all_inclusive' ? 'selected' : ''}>All inclusive</option>
                            </select>
                            <div class="input-hint">Mit tartalmaz az ár étkezésből.</div>
                        </div>
                    </div>
                    <div class="crud-row-2">
                        <div class="input-group">
                            <label class="input-label">Szállás ára (Ft, összesen)</label>
                            <input class="input-field" type="number" min="0" id="f_szallas_ar" value="${escapeAttr(item.tpa_szallas_ar)}">
                            <div class="input-hint">A TELJES csomagra (minden főre együtt), nem főnként.</div>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Szállás platform</label>
                            <select class="input-field" id="f_szallas_platform">
                                <option value="" ${!item.tpa_szallas_platform ? 'selected' : ''}>— válassz —</option>
                                <option value="szallas" ${item.tpa_szallas_platform === 'szallas' ? 'selected' : ''}>Szallas.hu</option>
                                <option value="booking" ${item.tpa_szallas_platform === 'booking' ? 'selected' : ''}>Booking.com</option>
                                <option value="egyeb" ${item.tpa_szallas_platform === 'egyeb' ? 'selected' : ''}>Egyéb</option>
                            </select>
                            <div class="input-hint">A foglalás-gomb feliratához használjuk.</div>
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Szállás affiliate link</label>
                        <input class="input-field" id="f_szallas_link" value="${escapeAttr(item.tpa_szallas_link)}" placeholder="https://...">
                        <div class="input-hint">Szallas.hu vagy Booking.com partner link.</div>
                    </div>
                </div>

                <!-- ═══ 4️⃣ ÁR ÖSSZESEN: fő-szám + élő számított végösszeg ═══ -->
                <div class="crud-blokk" id="blokk-4">
                    <div class="crud-section-title">4️⃣ Ár összesen</div>
                    <div class="crud-row-2">
                        <div class="input-group">
                            <label class="input-label">Hány főre szól</label>
                            <input class="input-field" type="number" min="1" id="f_fo_szam" value="${escapeAttr(item.tpa_fo_szam || '2')}">
                            <div class="input-hint">A jegyár (Ft/fő) ezzel szorzódik; a szállás ára már összesen értendő.</div>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Ár-felülírás (Ft)</label>

                <!-- ═══ 6️⃣ SZTORI ÉS KÉPEK: hogyan adjuk el ═══ -->

                        <label class="input-label">Kiemelt kép</label>

                </div>

                <!-- ═══ 7️⃣ MARKETING: SEO + közösségi média ═══ -->
                <div class="crud-blokk" id="blokk-7">
                    <div class="crud-section-title">7️⃣ Marketing</div>
                    <div class="input-group">
                        <button class="crud-tool-btn" id="seoAiBtn" type="button">✨ AI-javaslat a cím/leírás alapján</button>

                        <input class="input-field" id="f_seo_title" value="${escapeAttr(item.seo_title)}" maxlength="70" placeholder="Ha üresen hagyod, a WP/Yoast alapértelmezettet használja">

                    <div class="input-group">
                        <label class="input-label">Meta-leírás <span id="seoMetadescCount" style="font-weight:400;">0</span>/155</label>

                    </div>
                    <div class="input-group">
                        <button class="crud-tool-btn" id="postBtn" type="button">📱 Poszt-szöveg generálása (Instagram/TikTok)</button>
                        <div class="crud-tool-panel" id="postPanel" style="display:none;">
                            <button class="btn btn-accent btn-sm" id="postGenerateBtn" type="button">Generálás a jelenlegi adatokból</button>
                            <textarea class="input-field" id="postCaption" rows="5" style="margin-top:10px;" placeholder="Ide kerül a generált poszt-szöveg…" readonly></textarea>
                            <div id="postHashtags" style="margin:8px 0; color:var(--teal-light); font-size:13px;"></div>
                            <button class="btn btn-ghost btn-sm" id="postCopyBtn" type="button">📋 Másolás vágólapra</button>
                        </div>
                        <div class="input-hint">A cím/célállomás/ár/időpont mezők alapján generál – nem ment semmit a WP-be, csak másolásra szolgál.</div>
                    </div>
                </div>

                <!-- ═══ Sticky mentés-sáv: mindig látható ═══ -->
                <div class="crud-mentes-sav">
                    <button class="btn btn-primary" id="saveBtn">💾 Mentés</button>
                    <select class="input-field" id="f_status" style="width:auto;">
                        <option value="publish" ${item.status === 'publish' ? 'selected' : ''}>Publikált</option>
                        <option value="draft" ${item.status === 'draft' ? 'selected' : ''}>Piszkozat</option>
                    </select>
                    <div class="crud-teljesseg" id="teljessegJelzo"></div>
                    ${item.permalink ? `<a class="btn btn-ghost btn-sm" href="${item.permalink}" target="_blank">Megnézem élesben ↗</a>` : ''}
                    ${item.edit_url ? `<a class="btn btn-ghost btn-sm" href="${item.edit_url}" target="_blank">WP admin ↗</a>` : ''}
                </div>
            `;

            // Ugrómenü: görgetés a blokkokra
            document.querySelectorAll('.crud-ugro').forEach(btn => {
                btn.addEventListener('click', () => {
                    const cel = document.getElementById(btn.dataset.cel);
                    if (cel) cel.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
            });

            document.getElementById('kategoriaGrid').querySelectorAll('.crud-tag').forEach(tag => {
                tag.addEventListener('click', () => {
                    const name = tag.dataset.name;
                    tag.classList.toggle('selected');
                    selectedKategoriak = selectedKategoriak.includes(name)
                        ? selectedKategoriak.filter(n => n !== name)
                        : [...selectedKategoriak, name];
                });
            });

            document.getElementById('f_ajanlat_tipus').addEventListener('change', () => {
                frissitTipusMezok();
                updatePricePreview();
            });
            frissitTipusMezok();

            // Gépelős úticél-kereső (rejtett f_uticel mezőbe menti az ID-t)
            createSearchableSelect(document.getElementById('uticelMount'), {
                options: (meta.uticelok || []).map(u => ({ id: u.id, label: u.label })),
                selectedId: item.tpa_uticel,
                hiddenId: 'f_uticel',
                placeholder: 'Kezdj gépelni… (pl. Schladming vagy Ausztria)',
            });

            // Reptér-választók (repülős típusnál): a kód a rejtett mezőbe kerül,
            // a városnév automatikusan kitölti a társmezőket.
            const reptOptions = AIRPORTS.map(a => ({ id: a.code, label: `${a.label} (${a.code})` }));
            createSearchableSelect(document.getElementById('indulasReptMount'), {
                options: reptOptions,
                selectedId: item.tpa_indulas_iata,
                hiddenId: 'f_indulas_iata',
                placeholder: 'Kezdj gépelni… (pl. Budapest vagy BUD)',
                onSelect: (code) => {
                    const repter = AIRPORTS.find(a => a.code === code);
                    document.getElementById('f_indulas').value = repter ? repter.label : '';
                    updateTeljesseg();
                },
            });
            createSearchableSelect(document.getElementById('celReptMount'), {
                options: reptOptions,
                selectedId: item.tpa_cel_iata,
                hiddenId: 'f_cel_iata',
                placeholder: 'Kezdj gépelni… (pl. Preveza vagy PVK)',
                onSelect: (code) => {
                    const repter = AIRPORTS.find(a => a.code === code);
                    document.getElementById('f_cel_varos').value = repter ? repter.label : '';
                    updateTeljesseg();
                },
            });

            ['f_repjegy', 'f_busz_ar', 'f_szallas_ar', 'f_fo_szam', 'f_ar'].forEach(id => {
                document.getElementById(id).addEventListener('input', updatePricePreview);
            });
            updatePricePreview();

            ['f_indulas_datum', 'f_hazaut_datum'].forEach(id => {
                document.getElementById(id).addEventListener('change', updateDatumInfo);
            });
            updateDatumInfo();

            document.getElementById('datumFallbackBtn').addEventListener('click', () => {
                const panel = document.getElementById('datumFallbackPanel');
                panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            });

            contentQuill = setupQuillEditor('quill_content', 'f_content', item.content, 'Az ajánlat rövid, csábító leírása…');

            document.getElementById('aiBtn').addEventListener('click', () => {
                const panel = document.getElementById('aiPanel');
                panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            });
            document.getElementById('aiGenerateBtn').addEventListener('click', runAI);

            document.getElementById('kiwiGenerateBtn').addEventListener('click', runKiwiBuilder);
            document.getElementById('kiwiTestBtn').addEventListener('click', () => {
                const url = document.getElementById('f_kiwi').value.trim();
                if (!url) { toast('Nincs még kitöltve a Kiwi.com link.', 'info'); return; }
                window.open(url, '_blank');
            });

            document.getElementById('postBtn').addEventListener('click', () => {
                const panel = document.getElementById('postPanel');
                panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            });
            document.getElementById('postGenerateBtn').addEventListener('click', runPostCaption);
            document.getElementById('postCopyBtn').addEventListener('click', copyPostCaption);

            attachCharCounter('f_seo_title', 'seoTitleCount', 60);
            attachCharCounter('f_seo_metadesc', 'seoMetadescCount', 155);
            document.getElementById('seoAiBtn').addEventListener('click', runSeoSuggestion);

            document.getElementById('saveBtn').addEventListener('click', saveItem);

            const dropzone = document.getElementById('dropzone');
            dropzone.addEventListener('click', () => {
                if (!activeId) { toast('Előbb mentsd el az ajánlatot, utána tölthetsz fel képet.', 'info'); return; }
                document.getElementById('fileInput').click();
            });
            document.getElementById('fileInput').addEventListener('change', handleImageUpload);

            renderGaleria();
            document.getElementById('galeriaFileInput').addEventListener('change', handleGaleriaUpload);

            updateTeljesseg();
        }

        // ---- Galéria: rács kirajzolása a currentItem.galeria (id/url/caption) alapján ----
        function renderGaleria() {
            const grid = document.getElementById('galeriaGridEl');
            const kepek = currentItem.galeria || [];

            grid.innerHTML = kepek.map(kep => `
                <div class="crud-gallery-item">
                    <div class="crud-gallery-thumb">
                        <img src="${kep.url}">
                        <button class="crud-gallery-remove" type="button" data-id="${kep.id}" title="Eltávolítás">✕</button>
                    </div>
                    <input class="crud-gallery-caption" type="text" data-id="${kep.id}" value="${escapeAttr(kep.caption || '')}" placeholder="Felirat (pl. Positano)">
                </div>`).join('') + (activeId ? `<div class="crud-gallery-add" id="galeriaAddTile" title="Kép hozzáadása">+</div>` : '');

            grid.querySelectorAll('.crud-gallery-remove').forEach(btn => {
                btn.addEventListener('click', () => removeGaleriaKep(parseInt(btn.dataset.id)));
            });
            grid.querySelectorAll('.crud-gallery-caption').forEach(inp => {
                inp.addEventListener('change', () => saveGaleriaCaption(parseInt(inp.dataset.id), inp.value));
            });
            const addTile = document.getElementById('galeriaAddTile');
            if (addTile) addTile.addEventListener('click', () => document.getElementById('galeriaFileInput').click());
        }

        async function handleGaleriaUpload(e) {
            const file = e.target.files[0];
            e.target.value = '';
            if (!file || !activeId) return;
            try {
                const uid = auth.currentUser.uid;
                const kimenet = await optimalizaltWebp(file);
                const path = `ajanlatok/${uid}/galeria_${Date.now()}_${safeFileName(kimenet.name)}`;
                const storageRef = ref(storage, path);
                await uploadBytes(storageRef, kimenet);
                const url = await getDownloadURL(storageRef);

                const result = await apiCall(PROXY, { action: 'galeria_add', extraQuery: { id: activeId }, body: { url } });
                currentItem.galeria = result.galeria;
                renderGaleria();
                toast('Galéria-kép hozzáadva!', 'success');
            } catch (e) {
                toast('Kép feltöltése sikertelen: ' + e.message, 'error');
            }
        }

        async function removeGaleriaKep(kepId) {
            try {
                const result = await apiCall(PROXY, { action: 'galeria_remove', extraQuery: { id: activeId, kep_id: kepId }, method: 'DELETE' });
                currentItem.galeria = result.galeria;
                renderGaleria();
                toast('Galéria-kép eltávolítva.', 'success');
            } catch (e) {
                toast('Eltávolítás sikertelen: ' + e.message, 'error');
            }
        }

        // A felirat a mezőből kilépve (change) mentődik; nem rajzoljuk újra a rácsot,
        // hogy a fókusz/gépelés ne ugorjon el a többi mezőről.
        async function saveGaleriaCaption(kepId, caption) {
            try {
                const result = await apiCall(PROXY, { action: 'galeria_caption', extraQuery: { id: activeId, kep_id: kepId }, body: { caption } });
                currentItem.galeria = result.galeria;
                toast('Felirat mentve.', 'success');
            } catch (e) {
                toast('Felirat mentése sikertelen: ' + e.message, 'error');
            }
        }

        // Típushelyes összeg – UGYANAZ a logika, mint a WP-oldali tpa_teljes_ar():
        // csak az aktuális típushoz tartozó utazási költség számít bele, a
        // jegyár FŐNKÉNTI (fő-számmal szorozzuk), a szállás ár összesen értendő.
        // Kézi ár-felülírásnál azt mutatjuk, mellette a számítottat viszonyításnak.
        function updatePricePreview() {
            const tipus = document.getElementById('f_ajanlat_tipus').value;
            const repjegy = parseFloat(document.getElementById('f_repjegy').value) || 0;
            const busz = parseFloat(document.getElementById('f_busz_ar').value) || 0;
            const szallas = parseFloat(document.getElementById('f_szallas_ar').value) || 0;
            const fo = Math.max(1, parseInt(document.getElementById('f_fo_szam').value) || 2);
            const arKezi = parseFloat(document.getElementById('f_ar').value) || 0;
            const preview = document.getElementById('pricePreview');

            const utazas = tipus === 'busz_szallas' ? busz : (tipus === 'csak_szallas' ? 0 : repjegy);
            const szamitott = utazas * fo + szallas;
            const ft = n => n.toLocaleString('hu-HU') + ' Ft';

            if (arKezi > 0) {
                preview.innerHTML = `Az oldalon megjelenő ár (kézi): <strong>${ft(arKezi)}</strong> / ${fo} fő`
                    + (szamitott > 0 ? ` <span class="crud-osszeg-mellek">– a részárakból számítva ${ft(szamitott)} lenne</span>` : '');
            } else if (szamitott > 0) {
                preview.innerHTML = `Az oldalon megjelenő ár: <strong>${ft(szamitott)}</strong> / ${fo} fő`;
            } else {
                preview.textContent = 'Add meg a jegyárat és/vagy a szállás árát – a végösszeg itt jelenik meg élőben.';
            }
        }

        // ---- Dátum-visszajelzés: mit fog kiírni az oldal a két dátumból ----
        function updateDatumInfo() {
            const indul = document.getElementById('f_indulas_datum').value;
            const haza = document.getElementById('f_hazaut_datum').value;
            const info = document.getElementById('datumInfo');
            if (!indul || !haza) {
                info.textContent = 'Ha megadod mindkét dátumot, az időpont-szöveget és az éjszakák számát ezekből számoljuk automatikusan.';
                return;
            }
            const i = new Date(indul), h = new Date(haza);
            const ejszakak = Math.round((h - i) / 86400000);
            if (ejszakak <= 0) {
                info.textContent = '⚠️ A hazaút dátuma nem későbbi az odaútnál – ellenőrizd!';
                return;
            }
            const fmt = d => d.toLocaleDateString('hu-HU', { year: 'numeric', month: 'long', day: 'numeric' });
            info.textContent = `Az oldalon így jelenik meg: ${fmt(i)} – ${fmt(h)} · ${ejszakak} éjszaka`;
        }

        // Az "Ajánlat típusa" select alapján mutatja/rejti a típus-specifikus
        // mezőket. A data-tpa-tipus több típust is felsorolhat vesszővel
        // elválasztva (pl. data-tpa-tipus="repulo_szallas,busz_szallas").
        function frissitTipusMezok() {
            const aktualisTipus = document.getElementById('f_ajanlat_tipus').value;
            document.querySelectorAll('[data-tpa-tipus]').forEach(mezo => {
                mezo.style.display = mezo.dataset.tpaTipus.split(',').includes(aktualisTipus) ? '' : 'none';
            });
        }

        async function runAI() {
            const promptEl = document.getElementById('aiPrompt');
            const btn = document.getElementById('aiGenerateBtn');
            if (!promptEl.value.trim()) { toast('Írj néhány szót arról, miről szóljon a szöveg.', 'info'); return; }
            btn.disabled = true; btn.textContent = 'Generálás…';
            try {
                const result = await generateWithAI('ajanlat', promptEl.value.trim());
                if (result.leiras) setQuillContent(contentQuill, 'f_content', result.leiras);
                toast('AI-szöveg beillesztve – nézd át mentés előtt!', 'success');
            } catch (e) {
                toast('AI hiba: ' + e.message, 'error');
            } finally {
                btn.disabled = false; btn.textContent = 'Generálás';
            }
        }

        // Kiwi-link a FŐ mezőkből: repterek + utazási dátumok – nincs duplikált
        // beírás, a link és a kártyán kiírt időpont nem tud széttartani.
        function runKiwiBuilder() {
            const from = document.getElementById('f_indulas_iata').value;
            const to = document.getElementById('f_cel_iata').value;
            const departure = document.getElementById('f_indulas_datum').value;
            const returnDate = document.getElementById('f_hazaut_datum').value;

            const hianyzik = [];
            if (!from) hianyzik.push('indulási reptér');
            if (!to) hianyzik.push('érkezési reptér');
            if (!departure) hianyzik.push('odaút dátuma');
            if (!returnDate) hianyzik.push('hazaút dátuma');
            if (hianyzik.length) {
                toast('A link összeállításához előbb töltsd ki fent: ' + hianyzik.join(', ') + '.', 'info');
                return;
            }

            try {
                document.getElementById('f_kiwi').value = buildKiwiLink({ from, to, departure, returnDate });
                updateTeljesseg();
                toast('Kiwi.com link összeállítva – ellenőrizd a "Tesztelés" gombbal!', 'success');
            } catch (e) {
                toast(e.message, 'error');
            }
        }

        async function runPostCaption() {
            const btn = document.getElementById('postGenerateBtn');
            btn.disabled = true; btn.textContent = 'Generálás…';
            try {
                const result = await generatePostCaption({
                    celallomas: document.getElementById('f_celallomas').value,
                    idopont: document.getElementById('f_idopont').value,
                    ejszakak: document.getElementById('f_ejszakak').value,
                    ar_format: document.getElementById('f_ar').value ? `${document.getElementById('f_ar').value} Ft` : '',
                    ar_megjegyzes: document.getElementById('f_ar_megjegyzes').value,
                });
                document.getElementById('postCaption').value = result.caption || '';
                document.getElementById('postHashtags').textContent = (result.hashtagek || []).join(' ');
                toast('Poszt-szöveg legenerálva!', 'success');
            } catch (e) {
                toast('AI hiba: ' + e.message, 'error');
            } finally {
                btn.disabled = false; btn.textContent = 'Generálás a jelenlegi adatokból';
            }
        }

        async function copyPostCaption() {
            const caption = document.getElementById('postCaption').value;
            const hashtags = document.getElementById('postHashtags').textContent;
            const full = [caption, hashtags].filter(Boolean).join('\n\n');
            if (!full) { toast('Előbb generálj poszt-szöveget.', 'info'); return; }
            try {
                await navigator.clipboard.writeText(full);
                toast('Vágólapra másolva!', 'success');
            } catch {
                toast('Másolás sikertelen – jelöld ki és másold kézzel.', 'error');
            }
        }

        async function runSeoSuggestion() {
            const btn = document.getElementById('seoAiBtn');
            btn.disabled = true; btn.textContent = 'Generálás…';
            try {
                const result = await generateSeoSuggestion({
                    title: document.getElementById('f_title').value,
                    contentHtml: document.getElementById('f_content').value,
                });
                if (result.seo_title) {
                    document.getElementById('f_seo_title').value = result.seo_title;
                    document.getElementById('f_seo_title').dispatchEvent(new Event('input'));
                }
                if (result.seo_metadesc) {
                    document.getElementById('f_seo_metadesc').value = result.seo_metadesc;
                    document.getElementById('f_seo_metadesc').dispatchEvent(new Event('input'));
                }
                toast('SEO-javaslat beillesztve – nézd át mentés előtt!', 'success');
            } catch (e) {
                toast('AI hiba: ' + e.message, 'error');
            } finally {
                btn.disabled = false; btn.textContent = '✨ AI-javaslat a cím/leírás alapján';
            }
        }

        // ---- Publikált ajánlat "teljességi" ellenőrzése (nem blokkol, csak jelez) ----
        // A szakmai minimum: dátumok, szállás neve+ellátás, ár, és a típushoz
        // tartozó foglalási link(ek).
        function felviteliHianyok(body) {
            const hianyok = [];
            const tipus = body.tpa_ajanlat_tipus;
            if (!body.tpa_indulas_datum || !body.tpa_hazaut_datum) hianyok.push('utazás dátumai');
            if (!body.tpa_szallas_nev) hianyok.push('szállás neve');
            if (!body.tpa_szallas_ellatas) hianyok.push('ellátás');
            if (!body.tpa_ar && !body.tpa_szallas_ar && !body.tpa_repjegy_ar && !body.tpa_busz_ar) hianyok.push('ár');
            if (tipus === 'repulo_szallas' && (!body.tpa_indulas_iata || !body.tpa_cel_iata)) hianyok.push('repterek (útvonal)');
            if (tipus === 'repulo_szallas' && !body.tpa_poggyasz) hianyok.push('poggyász-infó');
            if (tipus === 'repulo_szallas' && !body.tpa_kiwi_link) hianyok.push('Kiwi.com link');
            if (tipus === 'busz_szallas' && !body.tpa_busz_link) hianyok.push('busz link');
            if (!body.tpa_szallas_link) hianyok.push('szállás link');
            if (tipus === 'repulo_szallas' && body.tpa_kiwi_link && !body.tpa_kiwi_link.includes('travelpayouts.com')) {
                hianyok.push('a Kiwi-link nem a Travelpayouts-wrapper (így nem jár jutalék!)');
            }
            return hianyok;
        }

        // ---- A mentendő adatok összegyűjtése az űrlapról (mentés + élő jelző közös) ----
        function gatherBody() {
            return {
                title: document.getElementById('f_title').value.trim(),
                content: document.getElementById('f_content').value,
                status: document.getElementById('f_status').value,
                kategoriak: selectedKategoriak,
                seo_title: document.getElementById('f_seo_title').value,
                seo_metadesc: document.getElementById('f_seo_metadesc').value,
                tpa_celallomas: document.getElementById('f_celallomas').value,
                tpa_indulas: document.getElementById('f_indulas').value,
                tpa_indulas_iata: document.getElementById('f_indulas_iata').value,
                tpa_cel_iata: document.getElementById('f_cel_iata').value,
                tpa_cel_varos: document.getElementById('f_cel_varos').value,
                tpa_indulas_datum: document.getElementById('f_indulas_datum').value,
                tpa_hazaut_datum: document.getElementById('f_hazaut_datum').value,
                tpa_idopont: document.getElementById('f_idopont').value,
                tpa_ejszakak: document.getElementById('f_ejszakak').value,
                tpa_uticel: document.getElementById('f_uticel').value,
                tpa_miert_szuper: document.getElementById('f_miert_szuper').value,
                tpa_ajanlat_tipus: document.getElementById('f_ajanlat_tipus').value,
                tpa_poggyasz: document.getElementById('f_poggyasz').value,
                tpa_szallas_nev: document.getElementById('f_szallas_nev').value,
                tpa_szallas_csillag: document.getElementById('f_szallas_csillag').value,
                tpa_szallas_ellatas: document.getElementById('f_szallas_ellatas').value,
                tpa_repjegy_ar: document.getElementById('f_repjegy').value,
                tpa_busz_ar: document.getElementById('f_busz_ar').value,
                tpa_szallas_ar: document.getElementById('f_szallas_ar').value,
                tpa_fo_szam: document.getElementById('f_fo_szam').value,
                tpa_ar: document.getElementById('f_ar').value,
                tpa_ar_megjegyzes: document.getElementById('f_ar_megjegyzes').value,
                tpa_ervenyes: document.getElementById('f_ervenyes').value,
                tpa_statusz: document.getElementById('f_statusz').value,
                tpa_kiwi_link: document.getElementById('f_kiwi').value,
                tpa_busz_link: document.getElementById('f_busz_link').value,
                tpa_szallas_link: document.getElementById('f_szallas_link').value,
                tpa_szallas_platform: document.getElementById('f_szallas_platform').value,
            };
        }

        // ---- Élő teljességi jelző a sticky mentés-sávban ----
        function updateTeljesseg() {
            const el = document.getElementById('teljessegJelzo');
            if (!el || !document.getElementById('f_title')) return; // nincs nyitva szerkesztő
            const hianyok = felviteliHianyok(gatherBody());
            if (hianyok.length === 0) {
                el.textContent = '✔ Minden kulcsadat megvan';
                el.className = 'crud-teljesseg crud-teljesseg--kesz';
            } else {
                el.textContent = 'Hiányzik még: ' + hianyok.join(', ');
                el.className = 'crud-teljesseg crud-teljesseg--hiany';
            }
        }

        async function saveItem() {
            const body = gatherBody();
            if (!body.title) { toast('A cím megadása kötelező.', 'error'); return; }

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true; saveBtn.textContent = 'Mentés…';
            try {
                const saved = activeId
                    ? await apiCall(PROXY, { action: 'update', extraQuery: { id: activeId }, body })
                    : await apiCall(PROXY, { action: 'create', body });
                activeId = saved.id;
                toast('Elmentve!', 'success');
                await loadList();
                renderEditor(saved);
            } catch (e) {
                toast('Mentés sikertelen: ' + e.message, 'error');
            } finally {
                saveBtn.disabled = false; saveBtn.textContent = '💾 Mentés';
            }
        }

        async function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file || !activeId) return;
            const dropzone = document.getElementById('dropzone');
            dropzone.innerHTML = '<div class="spinner"></div>';
            try {
                const uid = auth.currentUser.uid;
                const kimenet = await optimalizaltWebp(file);
                const path = `ajanlatok/${uid}/${Date.now()}_${safeFileName(kimenet.name)}`;
                const storageRef = ref(storage, path);
                await uploadBytes(storageRef, kimenet);
                const url = await getDownloadURL(storageRef);

                const result = await apiCall(PROXY, { action: 'sideload', extraQuery: { id: activeId }, body: { url } });
                dropzone.innerHTML = `<img src="${result.url}">`;
                toast('Kép feltöltve!', 'success');
                loadList();
            } catch (e) {
                toast('Kép feltöltése sikertelen: ' + e.message, 'error');
                dropzone.innerHTML = '<span class="crud-dropzone-label">Kattints ide a kép feltöltéséhez</span>';
            }
        }

        function escapeHtml(s) { return (s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }
        function escapeAttr(s) { return (s ?? '').toString().replace(/"/g, '&quot;'); }
    </script>
</body>
</html>
